<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">C6 C7 C8 finger numbness map</title>
  <desc id="desc">Educational finger numbness map showing possible C6 C7 and C8 nerve root clues with overlap.</desc>
  <rect width="1200" height="700" rx="24" fill="#fff8f4"/>
  <text x="600" y="78" text-anchor="middle" fill="#162026" font-family="Arial, sans-serif" font-size="42" font-weight="700">Finger Numbness: C6 / C7 / C8 Clues</text>
  <g>
    <rect x="107" y="250" width="116" height="310" rx="58" fill="#167a7f" opacity="0.9"/>
    <text x="165" y="340" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="44" font-weight="800">C6</text>
    <text x="165" y="606" text-anchor="middle" fill="#162026" font-family="Arial, sans-serif" font-size="28" font-weight="700">Thumb</text>
  </g>
<g>
    <rect x="302" y="185" width="116" height="390" rx="58" fill="#167a7f" opacity="0.9"/>
    <text x="360" y="275" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="44" font-weight="800">C6</text>
    <text x="360" y="621" text-anchor="middle" fill="#162026" font-family="Arial, sans-serif" font-size="28" font-weight="700">Index</text>
  </g>
<g>
    <rect x="497" y="160" width="116" height="430" rx="58" fill="#d8644a" opacity="0.9"/>
    <text x="555" y="250" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="44" font-weight="800">C7</text>
    <text x="555" y="636" text-anchor="middle" fill="#162026" font-family="Arial, sans-serif" font-size="28" font-weight="700">Middle</text>
  </g>
<g>
    <rect x="692" y="190" width="116" height="380" rx="58" fill="#c8902f" opacity="0.9"/>
    <text x="750" y="280" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="44" font-weight="800">C8</text>
    <text x="750" y="616" text-anchor="middle" fill="#162026" font-family="Arial, sans-serif" font-size="28" font-weight="700">Ring</text>
  </g>
<g>
    <rect x="877" y="260" width="116" height="300" rx="58" fill="#c8902f" opacity="0.9"/>
    <text x="935" y="350" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="44" font-weight="800">C8</text>
    <text x="935" y="606" text-anchor="middle" fill="#162026" font-family="Arial, sans-serif" font-size="28" font-weight="700">Little</text>
  </g>
  <path d="M260 620 C420 660 740 660 910 620" fill="none" stroke="#9db8b4" stroke-width="34" stroke-linecap="round"/>
  <text x="600" y="675" text-anchor="middle" fill="#5b6a72" font-family="Arial, sans-serif" font-size="24">Patterns overlap with carpal tunnel, ulnar nerve, and thoracic outlet symptoms.</text>
</svg>