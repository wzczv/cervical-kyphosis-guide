name: Submit IndexNow

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "sitemap.xml"
      - "16d893c718cadee9837fbde922d08c8f.txt"
      - "**/*.html"
      - "assets/**"
      - "scripts/submit-indexnow.mjs"

permissions:
  contents: read

concurrency:
  group: indexnow-submit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Wait for Pages sitemap update
        run: |
          expected=$(grep -c "<loc>" sitemap.xml)
          echo "Waiting for live sitemap to publish ${expected} URLs"
          sleep 60
          for attempt in {1..20}; do
            actual=$(curl -fsSL https://cervicalcurveguide.com/sitemap.xml | grep -c "<loc>" || true)
            echo "Attempt ${attempt}: live sitemap has ${actual}/${expected} URLs"
            if [ "${actual}" = "${expected}" ]; then
              exit 0
            fi
            sleep 30
          done
          echo "Live sitemap did not match the checked-out sitemap after 10 minutes"
          exit 1
      - name: Submit sitemap URLs to IndexNow and Bing
        run: node scripts/submit-indexnow.mjs
